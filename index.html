<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 로또 번호 추천기</h1>
            <p>데이터 분석 기반 로또 번호 추천</p>
        </header>

        <div class="content">
            <section class="analysis-section">
                <h2>📊 번호 분석</h2>
                <button id="loadBtn" class="btn-primary">로또 번호 분석하기</button>
                <div id="loading" class="loading" style="display: none;">
                    <p>로또 번호를 분석 중입니다...</p>
                </div>
                
                <div id="analysisResult" class="analysis-result" style="display: none;">
                    <div class="analysis-grid">
                        <div class="analysis-box">
                            <h3>🔥 자주 나온 번호 (TOP 10)</h3>
                            <div id="frequentNumbers" class="number-list"></div>
                        </div>
                        <div class="analysis-box">
                            <h3>❄️ 나오지 않은 번호 (MISSING)</h3>
                            <div id="missingNumbers" class="number-list"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="recommendation-section" id="recommendationSection" style="display: none;">
                <h2>💡 추천 번호 (10가지 방법)</h2>
                <div class="recommendations-grid" id="recommendationsGrid"></div>
            </section>

            <section class="info-section">
                <h3>📌 정보</h3>
                <p>데이터 출처: trumpjh.github.io/roto (20회차 로또번호)</p>
                <p>각 번호는 1~45 범위의 로또 번호입니다.</p>
                <p>분석 기반으로 10가지 다른 방법으로 추천합니다.</p>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
